<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Secret — EnvBurn</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
    .card { background: #1a1a1a; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; border: 1px solid #333; }
    h1 { font-size: 2rem; margin-bottom: 1rem; }
    .secret-content { background: #0f0f0f; border: 1px solid #333; border-radius: 8px; padding: 1rem; font-family: 'SF Mono', monospace; font-size: 14px; white-space: pre-wrap; word-break: break-all; color: #4ade80; min-height: 100px; }
    .error { color: #ff6b6b; }
    .burned { 
      padding: 1rem; background: #1a0a0a; border: 2px solid #5c1d1d; border-radius: 8px; 
      color: #ff6b6b; text-align: center; 
    }
    .burned::before { content: "🔥"; font-size: 4rem; display: block; margin-bottom: 0.5rem; }
    button { background: #ff6b6b; border: none; padding: 0.75rem 2rem; border-radius: 8px; color: #fff; font-weight: 600; cursor: pointer; font-size: 1rem; margin-top: 1rem; }
    button:hover { opacity: 0.9; }
    button:disabled { background: #333; cursor: not-allowed; }
    .warning { background: #2a1a10; border-left: 4px solid #feca57; padding: 1rem; margin-bottom: 1rem; color: #feca57; }
    .footer { text-align: center; margin-top: 2rem; color: #666; }
    .shimmer { animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading" class="card shimmer">
      <h1>🔥 EnvBurn</h1>
      <p>Loading secret...</p>
    </div>

    <div id="reveal" class="card" style="display: none;">
      <div class="warning">
        ⚠️ This message can only be viewed once. Once you proceed, it will be burned forever.
      </div>
      <button onclick="revealSecret()">Reveal Secret</button>
    </div>

    <div id="content" class="card" style="display: none;">
      <h1>Your Secret</h1>
      <div class="secret-content" id="secretData"></div>
      <div class="footer">
        <p>🔥 This secret has been burned and cannot be viewed again</p>
      </div>
    </div>

    <div id="burned" class="card burned" style="display: none;">
      <h2>Secret Burned</h2>
      <p>This secret does not exist, has expired, or has already been viewed.</p>
      <p style="margin-top: 1rem;"><a href="/" style="color: #fff;">← Share a new secret</a></p>
    </div>

    <div id="error" class="card" style="display: none;">
      <div class="error"></div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000';
    let id, key;

    function init() {
      const hash = window.location.hash;
      const path = window.location.pathname.split('/');
      
      if (!hash || hash.length < 2) {
        showBurned();
        return;
      }

      key = hash.substring(1); // Remove the #
      id = path[path.length - 1];

      // Show reveal button instead of auto-decrypting for UX
      document.getElementById('loading').style.display = 'none';
      document.getElementById('reveal').style.display = 'block';
    }

    async function revealSecret() {
      document.getElementById('reveal').style.display = 'none';
      document.getElementById('loading').style.display = 'block';

      try {
        const response = await fetch(`${API_URL}/api/secrets/${id}?key=${encodeURIComponent(key)}`);
        const data = await response.json();

        document.getElementById('loading').style.display = 'none';

        if (response.ok) {
          document.getElementById('content').style.display = 'block';
          document.getElementById('secretData').textContent = data.content;
          
          // Visual flare
          setTimeout(() => {
            document.getElementById('secretData').style.animation = 'none';
          }, 500);
        } else {
          showBurned();
        }
      } catch {
        showBurned();
      }
    }

    function showBurned() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('reveal').style.display = 'none';
      document.getElementById('content').style.display = 'none';
      document.getElementById('burned').style.display = 'block';
    }

    init();
  </script>
</body>
</html>
