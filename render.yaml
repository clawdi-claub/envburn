services:
  - type: web
    name: envburn
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: BASE_URL
        value: https://envburn.onrender.com
      - key: STRIPE_PK
        fromSecret: stripe-pk
      - key: STRIPE_SECRET_KEY
        fromSecret: stripe-sk
      - key: STRIPE_PRICE_ID
        fromSecret: stripe-price-id
      - key: STRIPE_WEBHOOK_SECRET
        fromSecret: stripe-webhook-secret
      - key: RESEND_API_KEY
        fromSecret: resend-api-key
      - key: ENVBURN_PRO
        value: prod_U5tp5f9TgvWkBq
      - key: WEBHOOKMAIL_PRO
        value: prod_U5ti1ORP25xnXP
    disk:
      name: envburn-data
      mountPath: /app/data
      sizeGB: 1
    healthCheckPath: /health
    autoDeploy: true
